<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#F5F7FB"/>

  <!-- Top Nav -->
  <rect x="0" y="0" width="1200" height="70" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="30" y="44" font-family="sans-serif" font-size="18" fill="#0F172A">LiveNews</text>
  <text x="140" y="44" font-family="sans-serif" font-size="12" fill="#64748B">Top  |  National  |  Business  |  Tech  |  Sports  |  Entertainment</text>
  <rect x="760" y="22" width="200" height="26" rx="13" fill="#E2E8F0" stroke="#CBD5E1"/>
  <text x="775" y="40" font-family="sans-serif" font-size="11" fill="#0F172A">Refresh: 3m | 10m | Off (login)</text>
  <rect x="980" y="22" width="180" height="26" rx="13" fill="#E2E8F0" stroke="#CBD5E1"/>
  <text x="995" y="40" font-family="sans-serif" font-size="11" fill="#0F172A">Mode: Day / Night</text>

  <!-- Layout Columns -->
  <rect x="20" y="90" width="860" height="680" rx="14" fill="#FFFFFF" stroke="#CBD5E1"/>
  <rect x="900" y="90" width="280" height="680" rx="14" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="30" y="110" font-family="sans-serif" font-size="11" fill="#64748B">Main Column (75%)</text>
  <text x="910" y="110" font-family="sans-serif" font-size="11" fill="#64748B">Right Rail (25%)</text>

  <!-- Main: Top Stories / Trending / Most Clicked -->
  <rect x="40" y="130" width="820" height="300" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="60" y="160" font-family="sans-serif" font-size="14" fill="#0F172A">Top Stories + Trending + Most Clicked (Primary Focus)</text>
  <rect x="60" y="180" width="760" height="18" fill="#E2E8F0"/>
  <rect x="60" y="210" width="700" height="18" fill="#E2E8F0"/>
  <rect x="60" y="240" width="740" height="18" fill="#E2E8F0"/>
  <rect x="60" y="270" width="680" height="18" fill="#E2E8F0"/>
  <rect x="60" y="300" width="520" height="18" fill="#E2E8F0"/>

  <!-- Main: News Feed -->
  <rect x="40" y="450" width="820" height="300" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="60" y="480" font-family="sans-serif" font-size="14" fill="#0F172A">News Feed (After Top Stories)</text>
  <rect x="60" y="510" width="760" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
  <rect x="60" y="560" width="760" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
  <rect x="60" y="610" width="760" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
  <rect x="60" y="660" width="760" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>

  <!-- Right Rail: Local News -->
  <rect x="920" y="130" width="240" height="180" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="940" y="155" font-family="sans-serif" font-size="13" fill="#0F172A">Local News</text>
  <text x="940" y="175" font-family="sans-serif" font-size="11" fill="#64748B">Use my location (cookies)</text>
  <rect x="940" y="190" width="200" height="26" rx="6" fill="#E2E8F0"/>
  <text x="950" y="208" font-family="sans-serif" font-size="11" fill="#0F172A">Manual county/city</text>
  <rect x="940" y="225" width="200" height="24" rx="6" fill="#FFFFFF" stroke="#CBD5E1"/>
  <rect x="940" y="255" width="200" height="24" rx="6" fill="#E2E8F0"/>
  <text x="950" y="271" font-family="sans-serif" font-size="10" fill="#0F172A">View local hub</text>

  <!-- Right Rail: Community Hub -->
  <rect x="920" y="330" width="240" height="200" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="940" y="355" font-family="sans-serif" font-size="13" fill="#0F172A">Community Hub</text>
  <rect x="940" y="375" width="200" height="28" rx="6" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="950" y="394" font-family="sans-serif" font-size="11" fill="#0F172A">Login</text>
  <rect x="940" y="415" width="200" height="28" rx="6" fill="#E2E8F0"/>
  <text x="950" y="434" font-family="sans-serif" font-size="11" fill="#0F172A">Sign up</text>
  <rect x="940" y="455" width="200" height="56" rx="6" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="950" y="490" font-family="sans-serif" font-size="10" fill="#64748B">Community preview</text>

  <!-- Right Rail: Optional Ad Slot -->
  <rect x="920" y="550" width="240" height="200" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-dasharray="6 6"/>
  <text x="940" y="575" font-family="sans-serif" font-size="12" fill="#64748B">Ad / Sponsor (Optional)</text>

  <!-- Footer Note -->
  <text x="20" y="790" font-family="sans-serif" font-size="11" fill="#64748B">Wireframe: 75% main news focus, 25% right rail with local + community + optional ads.</text>
</svg>
