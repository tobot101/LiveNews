<!doctype html>
<html lang="en" data-theme="day">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log In to Live News</title>
    <meta name="robots" content="noindex, follow" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="Live News home">
        <img class="brand-mark" src="/brand-mark.png" alt="" aria-hidden="true" />
        <div class="brand-text">
          <div class="brand-title">Live News</div>
          <div class="brand-sub">Anytime &amp; Anywhere</div>
        </div>
      </a>
      <div class="topbar-tools auth-nav">
        <a class="btn ghost" href="/signup">Create account</a>
        <a class="btn ghost" href="/account">Account</a>
      </div>
    </header>

    <main class="account-page">
      <section class="panel account-card">
        <p class="story-kicker">Live News account</p>
        <h1>Log in</h1>
        <p class="panel-note">Use your Live News email and password.</p>
        <form class="account-form" id="loginForm">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" autocomplete="email" required />
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" autocomplete="current-password" required />
          <button class="btn" type="submit">Log in</button>
        </form>
        <p class="account-message" id="authMessage" aria-live="polite"></p>
        <button class="btn ghost account-link-button" type="button" id="forgotPasswordToggle">Forgot password?</button>
        <div class="account-verification-panel" id="forgotPasswordPanel" hidden>
          <h2>Reset your password</h2>
          <p class="panel-note">Enter your email and Live News will send a Firebase password reset email.</p>
          <form class="account-form" id="passwordResetForm">
            <label for="resetEmail">Email</label>
            <input id="resetEmail" type="email" autocomplete="email" />
            <button class="btn" type="submit">Send reset email</button>
          </form>
          <p class="account-message" id="resetMessage" aria-live="polite"></p>
        </div>
        <p class="panel-note">Need an account? <a href="/signup">Create one</a>.</p>
      </section>
    </main>

    <script type="module" src="/auth-ui.js"></script>
  </body>
</html>
