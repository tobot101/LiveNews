<!doctype html>
<html lang="en" data-theme="day">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Live News Account</title>
    <meta name="robots" content="noindex, follow" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="Live News home">
        <img class="brand-mark" src="/brand-mark.png" alt="" aria-hidden="true" />
        <div class="brand-text">
          <div class="brand-title">Live News</div>
          <div class="brand-sub">Anytime &amp; Anywhere</div>
        </div>
      </a>
      <div class="topbar-tools auth-nav">
        <a class="btn ghost" href="/login">Log in</a>
        <a class="btn ghost" href="/account">Account</a>
      </div>
    </header>

    <main class="account-page">
      <section class="panel account-card">
        <p class="story-kicker">Live News account</p>
        <h1>Create your account</h1>
        <p class="panel-note">Start with a free Live News account. Paid membership and checkout are not part of this phase.</p>
        <form class="account-form" id="signupForm">
          <label for="signupEmail">Email</label>
          <input id="signupEmail" type="email" autocomplete="email" required />
          <label for="signupPassword">Password</label>
          <input id="signupPassword" type="password" autocomplete="new-password" minlength="6" required />
          <button class="btn" type="submit">Create account</button>
        </form>
        <p class="account-message" id="authMessage" aria-live="polite"></p>
        <p class="panel-note">Already have an account? <a href="/login">Log in</a>.</p>
      </section>
    </main>

    <script type="module" src="/auth-ui.js"></script>
  </body>
</html>
