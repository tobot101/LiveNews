<!doctype html>
<html lang="en" data-theme="day">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verify Email | Live News</title>
    <meta name="robots" content="noindex, follow" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="Live News home">
        <img class="brand-mark" src="/brand-mark.png" alt="" aria-hidden="true" />
        <div class="brand-text">
          <div class="brand-title">Live News</div>
          <div class="brand-sub">Anytime &amp; Anywhere</div>
        </div>
      </a>
      <div class="topbar-tools auth-nav">
        <a class="btn ghost" href="/login">Log in</a>
        <a class="btn ghost" href="/account">Account</a>
      </div>
    </header>

    <main class="account-page">
      <section class="panel account-card">
        <p class="story-kicker">Live News account</p>
        <h1 id="authActionTitle">Verifying your email...</h1>
        <p class="panel-note" id="authActionMessage">Please wait while Live News confirms this Firebase verification link.</p>
        <div class="account-actions">
          <a class="btn" href="/account" id="authActionContinue" hidden>Continue to Live News</a>
          <button class="btn ghost" type="button" id="authActionResend" hidden>Send a new verification email</button>
          <a class="btn ghost" href="/login" id="authActionLogin" hidden>Log in</a>
        </div>
        <p class="account-message" id="authActionStatus" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="/auth-action.js"></script>
  </body>
</html>
